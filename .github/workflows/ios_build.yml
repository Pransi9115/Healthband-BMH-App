name: iOS Build

on:
  push:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.13.0'
      
      - run: flutter pub get
      
      - run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..
      
      - run: flutter build ios --release
      
