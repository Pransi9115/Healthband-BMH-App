name: iOS Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.1

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable

      - name: Clean pub cache
        run: rm -rf ~/.pub-cache

      - name: Clean Flutter
        run: flutter clean

      - name: Get dependencies (MUST run first!)
        run: flutter pub get

      - name: Install pods (after flutter pub get)
        run: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks/ Flutter/Flutter.framework Flutter/Flutter.podspec
          pod install --repo-update
          cd ..

      - name: Build iOS app
        run: flutter build ios --release --no-codesign

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: BMH-App-iOS-Release
          path: build/ios/iphoneos/Runner.app
          retention-days: 30
